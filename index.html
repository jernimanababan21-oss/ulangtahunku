<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        
        #btn-alert {
            border: none;
            border-radius: 5px;
            padding: 7px 10px;
            background-color: rgb(37, 116, 226);
            font-size: 1.3em;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            position: fixed;
            left: 45%;
            top: 45%;
        }
        
        #btn-alert:hover {
            opacity: 0.8;
        }
        
        #btn-alert:focus {
            outline: rgb(37, 116, 226) solid 3px;
            outline-offset: 3px;
        }
        
        @media (max-width: 576px) {
            #btn-alert {
                left: 38%;
            }
        }
    </style>

    <title>Happy Birthday Kawan</title>
</head>

<body>

    <button id="btn-alert" onclick="munculinAlert()">Klik Aku!</button>

    <script>
        async function munculinAlert() {
            await Swal.fire('Hai Riana tukang teriaakk')
            await Swal.fire('Selamat menua umurnya yah!!!!')
            await Swal.fire({
                title: 'Happy 21st Birthday',
                text: 'Semoga panjang umur, sehat selalu, dilancarkan semua aktifitasnya, dan kiranya umur mu yang makin tua badannya berkembang yah biar ngga kayak anak SD',
                imageUrl: 'assets/gambar 1.jpeg',
                imageWidth: 400,
                imageHeight: 300,
                imageAlt: 'duduk sambil tersenyum',
            })
            await Swal.fire({
                title: 'Suka atau Tidak Suka, HARUS SUKA',
                text: "Tolong jawab yang betul yahh, tapi ngga ada pilihan lain selain suka, TITIK",
                icon: 'question',
                showDenyButton: true,
                confirmButtonColor: '#3085d6',
                confirmButtonText: 'Suka Banget!',
                denyButtonText: `Gak Suka!`,
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Mission Success',
                        text: 'Kerja bagus, nanti kalo potong kuenya sma pacar jangan lupa bawa ke kost, biar teman mu yang tak pernah pacaran ini bisa merasakan kue pemberian cowok, walau yah begitu!!!',
                        imageUrl: 'assets/gambar 2.jpeg',
                        imageWidth: 400,
                        imageHeight: 300,
                        imageAlt: 'berdiri sambil tersenyum',
                    })
                } else {
                    Swal.fire({
                        title: 'Mission tetap success',
                        text: 'Ngga boleh bagitu, sesama manusia harus menghargai, minta bakso dong btw hehehe ',
                        imageUrl: 'assets/gambar 3.jpeg',
                        imageWidth: 400,
                        imageHeight: 300,
                        imageAlt: 'tersenyum',
                    })
                }
            })
        }
    </script>

</body>

</html>
